<!DOCTYPE html>
<html>
<head>
    <title>Courses</title>
</head>
<body>

<h1>Available Courses</h1>

<ul>
    {% for course in courses %}
        <li>
            <h3>{{ course.title }}</h3>
            <p>{{ course.description }}</p>
            <p>Instructor: {{ course.instructor }}</p>
        </li>
    {% empty %}
        <p>No courses available.</p>
    {% endfor %}
</ul>

</body>
</html>
