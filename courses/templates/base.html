<!doctype html>
<html>
  <head>
    <title>Online Learning Platform</title>
    <style>

body{
    font-family: Arial, sans-serif;
    margin:40px;
    background-color:#f5f5f5;
}

h1{
    color:#333;
}

nav{
    margin-bottom:20px;
}

a{
    color:#0066cc;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}

ul,ol{
    background:white;
    padding:20px;
    border-radius:8px;
}

form{
    background:white;
    padding:20px;
    border-radius:8px;
    margin-top:20px;
}

button{
    padding:8px 14px;
    background:#0066cc;
    color:white;
    border:none;
    border-radius:4px;
    cursor:pointer;
}

button:hover{
    background:#004999;
}

</style>
  </head>
  <body>
    <h1>Online Learning Platform</h1>
<p>Browse courses and start learning today.</p>
   <nav>
    <a href="/courses/">All Courses</a>
</nav>

    {% if messages %}
    {% for message in messages %}
        <div style="background:#d4edda;padding:10px;margin-bottom:15px;border-radius:5px;">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}

    <hr />

    {% block content %} {% endblock %}
  </body>
</html>
